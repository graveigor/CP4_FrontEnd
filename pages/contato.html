    <!-- Fale conosco -->
    <main class="container my-5">
        <div class="text-center mb-5">
            <h2 class="mb-2">Fale Conosco</h2>
            <p class="text-muted">Tem alguma dúvida, sugestão ou quer saber mais sobre nossos produtos sustentáveis?
                Estamos aqui para ouvir você!</p>
        </div>
        <!-- Envie uma mensagem -->
        <div class="row g-5">
            <div class="col-lg-6">
                <div class="card border-0 shadow-sm p-4 h-100">
                    <h4 class="mb-4 border-start border-success border-3 ps-2">Envie uma Mensagem</h4>
                    <form action="#" method="POST">
                        <div class="mb-3">
                            <label for="nome" class="form-label">Nome Completo</label>
                            <input type="text" class="form-control" id="nome" placeholder="Digite seu nome" required>
                        </div>
                        <div class="mb-3">
                            <label for="email" class="form-label">E-mail</label>
                            <input type="email" class="form-control" id="email" placeholder="nome@exemplo.com" required>
                        </div>
                        <div class="mb-3">
                            <label for="assunto" class="form-label">Assunto</label>
                            <select class="form-select" id="assunto" required>
                                <option value="" selected disabled>Escolha um assunto...</option>
                                <option value="duvida">Dúvida sobre produto</option>
                                <option value="pedido">Status do meu pedido</option>
                                <option value="sugestao">Sugestão</option>
                                <option value="outro">Outro</option>
                            </select>
                        </div>
                        <div class="mb-4">
                            <label for="mensagem" class="form-label">Mensagem</label>
                            <textarea class="form-control" id="mensagem" rows="5"
                                placeholder="Escreva sua mensagem aqui..." required></textarea>

                        </div>
                        <button type="submit" class="btn btn-success w-100">Enviar Mensagem</button>
                    </form>
                </div>
            </div>
